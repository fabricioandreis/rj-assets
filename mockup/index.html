<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mockups RJ</title>
    <style>
      :root {
        color-scheme: light;
        --green: #00973d;
        --green-dark: #0c4728;
        --surface: rgba(255, 255, 255, 0.82);
        --line: rgba(12, 71, 40, 0.14);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--green-dark);
        background:
          radial-gradient(circle at top left, rgba(36, 191, 99, 0.18), transparent 35%),
          radial-gradient(circle at bottom right, rgba(0, 151, 61, 0.12), transparent 32%),
          linear-gradient(160deg, #edf7f1 0%, #f7faf8 55%, #d9ecdf 100%);
      }

      main {
        width: min(92vw, 760px);
        padding: 32px;
      }

      .card {
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--surface);
        backdrop-filter: blur(20px);
        box-shadow: 0 24px 80px rgba(6, 38, 20, 0.14);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--green);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.5rem);
        line-height: 0.95;
        letter-spacing: -0.05em;
      }

      p {
        max-width: 58ch;
        margin: 16px 0 0;
        font-size: 1rem;
        line-height: 1.6;
        color: rgba(12, 71, 40, 0.8);
      }

      .links {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        margin-top: 24px;
      }

      a {
        display: block;
        padding: 18px 20px;
        border-radius: 20px;
        border: 1px solid rgba(0, 151, 61, 0.18);
        text-decoration: none;
        background: rgba(255, 255, 255, 0.9);
        color: var(--green-dark);
        transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      }

      a:hover {
        transform: translateY(-2px);
        border-color: rgba(0, 151, 61, 0.35);
        box-shadow: 0 12px 30px rgba(6, 38, 20, 0.08);
      }

      a strong {
        display: block;
        margin-bottom: 4px;
        font-size: 1.1rem;
      }

      a span {
        color: rgba(12, 71, 40, 0.72);
        font-size: 0.95rem;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <p class="eyebrow">Recreio da Juventude</p>
        <h1>Mockups interativos v1 e v2</h1>
        <p>
          Abra uma das versoes abaixo depois de iniciar um servidor local na pasta
          <code>mobile/mockup</code>.
        </p>

        <div class="links">
          <a href="./v1/">
            <strong>Mockup v1</strong>
            <span>Versao original com home, reservas, pagamentos e demais fluxos.</span>
          </a>
          <a href="./v2/">
            <strong>Mockup v2</strong>
            <span>Versao mais refinada com a mesma estrutura navegavel.</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
