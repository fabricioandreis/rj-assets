<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RJ Assets</title>
    <style>
      :root {
        color-scheme: light;
        --green: #00973d;
        --green-dark: #0c4728;
        --bg: #eff6f1;
        --card: rgba(255, 255, 255, 0.88);
        --line: rgba(12, 71, 40, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--green-dark);
        background:
          radial-gradient(circle at top left, rgba(36, 191, 99, 0.18), transparent 30%),
          radial-gradient(circle at bottom right, rgba(0, 151, 61, 0.12), transparent 28%),
          linear-gradient(155deg, #f3faf5 0%, var(--bg) 48%, #dcefe2 100%);
      }

      main {
        width: min(94vw, 860px);
        padding: 32px;
      }

      .card {
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--card);
        backdrop-filter: blur(18px);
        box-shadow: 0 26px 80px rgba(6, 38, 20, 0.14);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--green);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 5vw, 4rem);
        line-height: 0.92;
        letter-spacing: -0.06em;
      }

      p {
        max-width: 62ch;
        margin: 16px 0 0;
        line-height: 1.6;
        color: rgba(12, 71, 40, 0.8);
      }

      .links {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        margin-top: 28px;
      }

      a {
        display: block;
        padding: 18px 20px;
        border-radius: 20px;
        border: 1px solid rgba(0, 151, 61, 0.18);
        background: rgba(255, 255, 255, 0.9);
        text-decoration: none;
        color: var(--green-dark);
        transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      }

      a:hover {
        transform: translateY(-2px);
        border-color: rgba(0, 151, 61, 0.35);
        box-shadow: 0 12px 30px rgba(6, 38, 20, 0.08);
      }

      a strong {
        display: block;
        margin-bottom: 4px;
        font-size: 1.05rem;
      }

      a span {
        color: rgba(12, 71, 40, 0.72);
        line-height: 1.45;
      }

      .meta {
        margin-top: 24px;
        padding-top: 18px;
        border-top: 1px solid rgba(12, 71, 40, 0.1);
        color: rgba(12, 71, 40, 0.68);
        font-size: 0.95rem;
      }

      code {
        padding: 0.1rem 0.35rem;
        border-radius: 0.35rem;
        background: rgba(0, 151, 61, 0.08);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <p class="eyebrow">Recreio da Juventude</p>
        <h1>RJ Assets</h1>
        <p>
          Repositorio publico com os mockups estaticos do app e assets de apoio.
          Abra a pagina de demonstracao abaixo.
        </p>

        <div class="links">
          <a href="./mockup/">
            <strong>Mockups interativos</strong>
            <span>Landing com links para as versoes v1 e v2.</span>
          </a>
        </div>

        <p class="meta">
          GitHub Pages deve publicar este repo em
          <code>https://fabricioandreis.github.io/rj-assets/</code>.
        </p>
      </section>
    </main>
  </body>
</html>
